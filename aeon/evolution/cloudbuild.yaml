steps:
  # Build the evolution engine container
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-east1-docker.pkg.dev/$PROJECT_ID/aeon-build-env/aeon-evolution:$SHORT_SHA'
      - '-t'
      - 'us-east1-docker.pkg.dev/$PROJECT_ID/aeon-build-env/aeon-evolution:latest'
      - '-f'
      - 'aeon/evolution/Dockerfile'
      - '.'

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'us-east1-docker.pkg.dev/$PROJECT_ID/aeon-build-env/aeon-evolution'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'aeon-evolution-engine'
      - '--image=us-east1-docker.pkg.dev/$PROJECT_ID/aeon-build-env/aeon-evolution:$SHORT_SHA'
      - '--region=us-east1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--set-env-vars=GCP_PROJECT=$PROJECT_ID,AEON_UPDATE_SERVER=https://aeon-update-server-y2r5ogip6q-ue.a.run.app'
      - '--set-secrets=AEON_CI_TOKEN=aeon-sovereign-signing-key:latest'
      - '--port=8080'

images:
  - 'us-east1-docker.pkg.dev/$PROJECT_ID/aeon-build-env/aeon-evolution:$SHORT_SHA'
  - 'us-east1-docker.pkg.dev/$PROJECT_ID/aeon-build-env/aeon-evolution:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
