steps:
  # =============================================
  # Stage 1: Build + Wine Test (Primary CI Gate)
  # Compiles DLL + test EXE with Open Watcom,
  # then validates runtime via Wine emulation.
  # =============================================
  - name: 'ubuntu:22.04'
    dir: 'retro'
    entrypoint: '/bin/bash'
    args:
      - '-c'
      - |
        set -e
        echo "=========================================="
        echo " Aeon Retro Engine — CI Build Pipeline"
        echo "=========================================="
        echo ""

        echo "=== Phase 1: Installing Open Watcom 2.0 ==="
        apt-get update -qq
        apt-get install -y -qq --no-install-recommends wget xz-utils ca-certificates make

        mkdir -p /opt/watcom
        wget -q "https://github.com/open-watcom/open-watcom-v2/releases/download/Current-build/ow-snapshot.tar.xz" -O /tmp/ow.tar.xz
        tar xf /tmp/ow.tar.xz -C /opt/watcom
        rm /tmp/ow.tar.xz

        export WATCOM=/opt/watcom
        export PATH="/opt/watcom/binl64:/opt/watcom/binl:$$PATH"
        export INCLUDE="/opt/watcom/h:/opt/watcom/h/nt:/opt/watcom/h/nt/directx:/opt/watcom/h/win"
        export LIB="/opt/watcom/lib386/nt:/opt/watcom/lib386:/opt/watcom/lib286/win:/opt/watcom/lib286"

        echo ""
        echo "=== Phase 2: Building BearSSL + DLL ==="
        sh build_full.sh

        echo ""
        echo "=== Phase 3: Building tls_test.exe ==="
        wcc386 -bt=nt -za99 -W3 -Ibearssl/inc -Ibearssl/src tls_test.c
        wlink NAME tls_test.exe SYSTEM nt FILE tls_test.o FILE bearssl_bridge.o LIBRARY bearssl.lib LIBRARY kernel32.lib LIBRARY wsock32.lib

        echo ""
        echo "--- Build Artifacts ---"
        ls -la aeon_html4.dll tls_test.exe 2>/dev/null || true
        echo ""

        echo "=== Phase 4: Wine Runtime Validation ==="
        dpkg --add-architecture i386
        apt-get update -qq
        apt-get install -y -qq --no-install-recommends wine wine32 2>/dev/null || {
          apt-get install -y -qq --no-install-recommends wine64 2>/dev/null || {
            echo "WARNING: Wine unavailable — skipping runtime test."
            echo "AEON_CI_WINE=SKIP"
          }
        }

        export WINEPREFIX=/tmp/wine_test
        export WINEDEBUG=-all
        wine wineboot --init 2>/dev/null || true
        sleep 2

        echo ""
        echo "=========================================="
        echo " Wine Runtime Tests"
        echo "=========================================="
        echo ""
        echo "--- Test: BearSSL TLS Engine ---"
        RESULT=0
        timeout 60 wine ./tls_test.exe 2>&1 || RESULT=$$?

        echo ""
        if [ "$$RESULT" = "0" ]; then
          echo "AEON_CI_WINE=PASS"
        else
          echo "AEON_CI_WINE=FAIL (exit=$$RESULT)"
        fi

        echo ""
        echo "=========================================="
        echo " CI PIPELINE COMPLETE"
        echo "=========================================="

        # Archive artifacts
        mkdir -p /workspace/build_out
        cp tls_test.exe /workspace/build_out/
        [ -f aeon_html4.dll ] && cp aeon_html4.dll /workspace/build_out/
        ls -la /workspace/build_out/

  # =============================================
  # Stage 2: Archive Build Artifacts to GCS
  # Saves DLL and test EXE for local ReactOS
  # validation and release packaging.
  # =============================================
  - name: 'gcr.io/cloud-builders/gsutil'
    entrypoint: '/bin/bash'
    args:
      - '-c'
      - |
        echo "=== Archiving build artifacts ==="
        TIMESTAMP=$(date +%Y%m%d-%H%M%S)
        DEST="gs://aeon-browser-build_cloudbuild/artifacts/$${TIMESTAMP}"

        gsutil -m cp /workspace/build_out/* "$${DEST}/"
        echo ""
        echo "Artifacts archived to: $${DEST}/"
        gsutil ls -la "$${DEST}/"

timeout: '1200s'
options:
  logging: GCS_ONLY
  machineType: 'E2_HIGHCPU_8'
