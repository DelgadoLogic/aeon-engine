# DOSBox-X Headless Configuration for AeonOS CI
# Used by ERA1 tier of the test matrix
#
# This runs DOS programs without any display, capturing
# serial output to a file for automated parsing.

[sdl]
output=none
fullscreen=false
autolock=false

[dosbox]
# Exit after program completes
machine=svga_s3
memsize=16

[cpu]
core=auto
cputype=486_slow
cycles=max

[serial]
serial1=file:serial_output.log

[autoexec]
# Mount the test directory as C:
mount c .
c:
# Run the 16-bit test binary
aeon16.exe
# Exit DOSBox-X when done
exit
