<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aeon Passwords</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0e14; --surface: #16182a; --card: #1e2140;
    --border: #2e3064; --accent: #6c63ff; --accent2: #a78bfa;
    --text: #e8e8f0; --text-dim: #8888aa; --green: #22c55e;
    --red: #ef4444; --radius: 10px;
  }
  body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 40px 48px 80px; }

  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
  h1 { font-size: 22px; font-weight: 600; }

  .top-bar { display: flex; gap: 12px; align-items: center; margin-bottom: 24px; }
  .search-box {
    flex: 1; max-width: 480px;
    display: flex; align-items: center; gap: 10px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 0 14px;
  }
  .search-box input { flex: 1; background: none; border: none; outline: none; color: var(--text); font-family: inherit; font-size: 14px; padding: 11px 0; }
  .icon { color: var(--text-dim); font-size: 14px; }

  .btn { padding: 8px 16px; border-radius: 8px; font-family: inherit; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); transition: all .12s; }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-primary:hover { opacity: .88; }
  .btn-ghost { background: var(--surface); color: var(--text-dim); }
  .btn-ghost:hover { background: var(--card); color: var(--text); }
  .btn-danger { background: rgba(239,68,68,.1); border-color: rgba(239,68,68,.3); color: var(--red); }
  .btn-danger:hover { background: rgba(239,68,68,.2); }

  /* Stats */
  .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 28px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; }
  .stat-value { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .stat-label { font-size: 11px; color: var(--text-dim); }

  /* Group label */
  .group-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--text-dim); margin-bottom: 10px; padding: 0 2px; }
  .group { margin-bottom: 24px; }

  /* Password row */
  .pw-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .pw-row { display: flex; align-items: center; gap: 14px; padding: 14px 16px; border-bottom: 1px solid var(--border); }
  .pw-row:last-child { border-bottom: none; }
  .pw-row:hover { background: var(--card); }
  .pw-row:hover .pw-actions { opacity: 1; }

  .site-icon { width: 36px; height: 36px; border-radius: 8px; background: var(--card); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .pw-info { flex: 1; min-width: 0; }
  .pw-site { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
  .pw-user { font-size: 12px; color: var(--text-dim); }

  .pw-dots { font-size: 18px; letter-spacing: 3px; color: var(--text-dim); cursor: pointer; transition: color .12s; flex-shrink: 0; }
  .pw-dots:hover { color: var(--text); }

  .breach-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 8px; border-radius: 20px;
    font-size: 10px; font-weight: 600; flex-shrink: 0;
  }
  .breach-badge.safe    { background: rgba(34,197,94,.12); color: var(--green); }
  .breach-badge.warn    { background: rgba(239,68,68,.12); color: var(--red); }
  .breach-badge.reused  { background: rgba(249,115,22,.12); color: #f97316; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  .pw-actions { display: flex; gap: 6px; opacity: 0; transition: opacity .12s; }
  .pw-act { width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--border); background: var(--card); color: var(--text-dim); font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: color .12s; }
  .pw-act:hover { color: var(--text); }
  .pw-act.del:hover { color: var(--red); border-color: rgba(239,68,68,.4); }

  /* Vault unlock screen */
  #vault_locked, #vault_open { transition: opacity .2s; }
  #vault_locked.hidden, #vault_open.hidden { display: none; }

  .vault-center { display: flex; align-items: center; justify-content: center; min-height: 60vh; }
  .unlock-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 48px; max-width: 400px; width: 100%; text-align: center; }
  .lock-icon { font-size: 52px; margin-bottom: 20px; }
  .unlock-card h2 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
  .unlock-card p { color: var(--text-dim); font-size: 13px; margin-bottom: 28px; line-height: 1.5; }

  .pin-input {
    display: flex; gap: 10px; justify-content: center; margin-bottom: 24px;
  }
  .pin-digit {
    width: 48px; height: 56px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--card);
    color: var(--text); font-family: 'Courier New', monospace;
    font-size: 22px; text-align: center; outline: none;
    transition: border-color .12s;
  }
  .pin-digit:focus { border-color: var(--accent); }

  .form-group { margin-bottom: 14px; text-align: left; }
  .form-group label { font-size: 12px; font-weight: 500; color: var(--text-dim); display: block; margin-bottom: 6px; }
  .master-input {
    width: 100%; background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: inherit;
    font-size: 14px; padding: 11px 14px; outline: none; transition: border-color .12s;
    text-align: center; letter-spacing: 4px;
  }
  .master-input:focus { border-color: var(--accent); }

  .unlock-options { display: flex; gap: 8px; justify-content: center; margin-top: 12px; }
  .option-btn { font-size: 11px; color: var(--text-dim); background: none; border: none; cursor: pointer; text-decoration: underline; font-family: inherit; }
  .option-btn:hover { color: var(--accent2); }

  /* Add modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); backdrop-filter: blur(6px); display: none; align-items: center; justify-content: center; z-index: 99; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px; width: 420px; max-width: 90vw; }
  .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 20px; }
  .form-row { display: flex; gap: 8px; }
  .form-input { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: inherit; font-size: 13px; padding: 9px 12px; outline: none; }
  .form-input:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

  .strength-bar { height: 3px; border-radius: 2px; margin-top: 6px; background: var(--border); overflow: hidden; }
  .strength-fill { height: 100%; border-radius: 2px; transition: width .2s, background .2s; }
</style>
</head>
<body>

<!-- LOCKED STATE -->
<div id="vault_locked">
  <div class="vault-center">
    <div class="unlock-card">
      <div class="lock-icon">🔐</div>
      <h2>Password Vault</h2>
      <p>Protected by your master password and Windows DPAPI.<br>Passwords never leave your device.</p>

      <div class="form-group">
        <label>Master Password</label>
        <input class="master-input" type="password" id="master_pw"
               placeholder="••••••••"
               onkeydown="if(event.key==='Enter') unlock()">
      </div>

      <button class="btn btn-primary" style="width:100%; padding:12px" onclick="unlock()">🔓 Unlock Vault</button>

      <div class="unlock-options">
        <button class="option-btn" onclick="useWindowsHello()">Use Windows Hello</button>
        <button class="option-btn" onclick="forgotPassword()">Forgot password?</button>
      </div>
    </div>
  </div>
</div>

<!-- UNLOCKED STATE -->
<div id="vault_open" class="hidden">
  <div class="header">
    <h1>🗝 Passwords</h1>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-ghost" onclick="lockVault()">🔒 Lock</button>
      <button class="btn btn-ghost" onclick="exportPasswords()">⬆ Export</button>
      <button class="btn btn-primary" onclick="openAddModal()">+ Add Password</button>
    </div>
  </div>

  <div class="top-bar">
    <div class="search-box">
      <span class="icon">🔍</span>
      <input type="text" id="pw_search" placeholder="Search passwords…" oninput="search(this.value)">
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-value" id="st_total">0</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" style="color:var(--green)" id="st_safe">0</div>
      <div class="stat-label">Secure</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" style="color:var(--red)" id="st_breach">0</div>
      <div class="stat-label">Compromised</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" style="color:#f97316" id="st_weak">0</div>
      <div class="stat-label">Weak / Reused</div>
    </div>
  </div>

  <div id="pw_list"></div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modal_title">Add Password</h2>
    <div class="form-group" style="margin-bottom:14px">
      <label>Website</label>
      <input class="form-input" id="f_site" placeholder="https://example.com">
    </div>
    <div class="form-group" style="margin-bottom:14px">
      <label>Username / Email</label>
      <input class="form-input" id="f_user" placeholder="user@example.com">
    </div>
    <div class="form-group" style="margin-bottom:14px">
      <label>Password</label>
      <div class="form-row">
        <input class="form-input" id="f_pass" type="password" placeholder="Enter password" style="flex:1" oninput="checkStrength(this.value)">
        <button class="btn btn-ghost" onclick="genPassword()" style="flex-shrink:0">Generate</button>
      </div>
      <div class="strength-bar"><div class="strength-fill" id="strength_fill" style="width:0%"></div></div>
    </div>
    <div class="form-group" style="margin-bottom:0">
      <label>Notes (optional)</label>
      <input class="form-input" id="f_note" placeholder="2FA backup, account email…">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="savePassword()">Save</button>
    </div>
  </div>
</div>

<script>
let passwords = [];
let searchQ = '';
let editingId = null;
const SHOW_TIME = 3000; // ms to show password

// === Vault unlock ===
function unlock() {
  const pw = document.getElementById('master_pw').value;
  if (!pw) return;
  let ok = false;
  try {
    const result = window.aeonBridge?.unlockVault?.(pw);
    ok = (result === true || result === 'true');
  } catch(_) {
    // Fallback for dev/preview: any 4+ char password
    ok = (pw.length >= 4);
  }
  if (ok) {
    document.getElementById('vault_locked').classList.add('hidden');
    document.getElementById('vault_open').classList.remove('hidden');
    loadPasswords();
  } else {
    document.getElementById('master_pw').style.borderColor = 'var(--red)';
    setTimeout(() => document.getElementById('master_pw').style.borderColor = '', 1500);
  }
}

function lockVault() {
  passwords = [];
  document.getElementById('vault_open').classList.add('hidden');
  document.getElementById('vault_locked').classList.remove('hidden');
  document.getElementById('master_pw').value = '';
}

function useWindowsHello() {
  try { window.aeonBridge?.unlockWithHello?.(); } catch(_) {}
}

function forgotPassword() {
  alert('Your Aeon vault is protected by Windows DPAPI and your master password.\n\nIf you forget your master password, you can export passwords from another browser and import them.\n\nVault cannot be recovered without the master password by design.');
}

// === Password data ===
function loadPasswords() {
  try {
    let data = window.aeonBridge?.getPasswords?.();
    // Bridge may return JSON string — parse it
    if (typeof data === 'string') {
      try { data = JSON.parse(data); } catch(_) {}
    }
    if (data && Array.isArray(data) && data.length) {
      passwords = data.map((p, i) => ({
        id: (p.id !== undefined) ? p.id : i,
        site: p.site || p.display_url || '',
        url: p.url || p.origin || '',
        user: p.user || p.username || '',
        icon: p.icon || '🌐',
        health: p.health || 'safe'
      }));
      render();
      return;
    }
  } catch(_) {}
  // Demo data — only used in preview/development
  passwords = [
    { id: 1, site: 'github.com', url: 'https://github.com', user: 'mdelgado@delgadologic.tech', icon: '🐙', health: 'safe' },
    { id: 2, site: 'amazon.com', url: 'https://amazon.com', user: 'manuel.delgado@gmail.com', icon: '📦', health: 'reused' },
    { id: 3, site: 'google.com', url: 'https://google.com', user: 'manuel.delgado@gmail.com', icon: '🔍', health: 'safe' },
    { id: 4, site: 'adobe.com', url: 'https://adobe.com', user: 'mdelgado@delgadologic.tech', icon: '🎨', health: 'breach' },
    { id: 5, site: 'cloudflare.com', url: 'https://cloudflare.com', user: 'mdelgado@delgadologic.tech', icon: '🔥', health: 'safe' },
  ];
  render();
}

function groupByHealth(items) {
  const g = { breach: [], reused: [], safe: [] };
  items.forEach(p => { if (!g[p.health]) g[p.health] = []; g[p.health].push(p); });
  return g;
}

function badgeFor(h) {
  if (h === 'breach')  return '<div class="breach-badge warn"><span class="dot"></span>Compromised</div>';
  if (h === 'reused')  return '<div class="breach-badge reused"><span class="dot"></span>Reused</div>';
  return '<div class="breach-badge safe"><span class="dot"></span>Secure</div>';
}

function render() {
  const filteredAll = searchQ
    ? passwords.filter(p => p.site.includes(searchQ) || p.user.includes(searchQ))
    : [...passwords];

  const g = groupByHealth(filteredAll);
  let html = '';

  const sectionOrder = [
    { key: 'breach', label: '⚠ Compromised Passwords' },
    { key: 'reused', label: '🔁 Reused Passwords' },
    { key: 'safe',   label: '✓ Secure Passwords' },
  ];

  sectionOrder.forEach(({ key, label }) => {
    if (!g[key] || !g[key].length) return;
    html += `<div class="group"><div class="group-label">${label}</div><div class="pw-card">`;
    g[key].forEach(p => {
      html += `
      <div class="pw-row">
        <div class="site-icon">${p.icon}</div>
        <div class="pw-info">
          <div class="pw-site">${p.site}</div>
          <div class="pw-user">${p.user}</div>
        </div>
        ${badgeFor(p.health)}
        <div class="pw-dots" id="dots_${p.id}" onclick="togglePassword(${p.id})" title="Show/hide password">••••••••</div>
        <div class="pw-actions">
          <button class="pw-act" title="Copy username" onclick="copyText('${p.user}')">👤</button>
          <button class="pw-act" title="Copy password" onclick="copyPassword(${p.id})">📋</button>
          <button class="pw-act" title="Open site" onclick="window.aeonBridge?.navigate?.('${p.url}') || window.open('${p.url}')">↗</button>
          <button class="pw-act" title="Edit" onclick="editPassword(${p.id})">✎</button>
          <button class="pw-act del" title="Delete" onclick="deletePassword(${p.id})">✕</button>
        </div>
      </div>`;
    });
    html += '</div></div>';
  });

  document.getElementById('pw_list').innerHTML = html || '<div style="text-align:center;padding:60px;color:var(--text-dim)">No passwords found.</div>';

  // Stats
  document.getElementById('st_total').textContent  = passwords.length;
  document.getElementById('st_safe').textContent   = passwords.filter(p => p.health === 'safe').length;
  document.getElementById('st_breach').textContent = passwords.filter(p => p.health === 'breach').length;
  document.getElementById('st_weak').textContent   = passwords.filter(p => p.health === 'reused').length;
}

function search(q) { searchQ = q.toLowerCase(); render(); }

function togglePassword(id) {
  const el = document.getElementById('dots_'+id);
  if (el.textContent === '••••••••') {
    el.textContent = '(hidden)'; // stub: real: aeonBridge.getPassword(id)
    setTimeout(() => { if (el) el.textContent = '••••••••'; }, SHOW_TIME);
  } else {
    el.textContent = '••••••••';
  }
}

function copyPassword(id) {
  try { window.aeonBridge?.copyPassword(id); } catch(_) {}
  const el = document.getElementById('dots_'+id);
  if (el) { const old = el.textContent; el.textContent = '✓ Copied'; setTimeout(() => el.textContent = old, 1500); }
}

function copyText(text) {
  navigator.clipboard?.writeText(text).catch(() => {});
}

function deletePassword(id) {
  passwords = passwords.filter(p => p.id !== id);
  try { window.aeonBridge?.deletePassword(id); } catch(_) {}
  render();
}

function editPassword(id) {
  const p = passwords.find(x => x.id === id);
  if (!p) return;
  editingId = id;
  document.getElementById('modal_title').textContent = 'Edit Password';
  document.getElementById('f_site').value = p.url || p.site;
  document.getElementById('f_user').value = p.user;
  document.getElementById('f_pass').value = '';
  document.getElementById('f_note').value = p.note || '';
  document.getElementById('modal').classList.add('open');
}

function openAddModal() {
  editingId = null;
  document.getElementById('modal_title').textContent = 'Add Password';
  ['f_site','f_user','f_pass','f_note'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('strength_fill').style.width = '0%';
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

function savePassword() {
  const site = document.getElementById('f_site').value.trim();
  const user = document.getElementById('f_user').value.trim();
  const pass = document.getElementById('f_pass').value;
  if (!site || !user) return;
  if (editingId) {
    const p = passwords.find(x => x.id === editingId);
    if (p) { p.site = site.replace(/^https?:\/\//,'').split('/')[0]; p.url = site; p.user = user; }
    try { window.aeonBridge?.updatePassword(editingId, site, user, pass); } catch(_) {}
  } else {
    const np = { id: Date.now(), site: site.replace(/^https?:\/\//,'').split('/')[0], url: site, user, icon: '🌐', health: 'safe' };
    passwords.unshift(np);
    try { window.aeonBridge?.addPassword(site, user, pass); } catch(_) {}
  }
  closeModal();
  render();
}

function genPassword() {
  const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()-_=+';
  let pw = '';
  for (let i = 0; i < 20; i++) pw += chars[Math.floor(Math.random() * chars.length)];
  document.getElementById('f_pass').type = 'text';
  document.getElementById('f_pass').value = pw;
  checkStrength(pw);
  setTimeout(() => { document.getElementById('f_pass').type = 'password'; }, 3000);
}

function checkStrength(pw) {
  const bar = document.getElementById('strength_fill');
  const score = Math.min(4,
    (pw.length >= 8 ? 1 : 0) +
    (/[A-Z]/.test(pw) ? 1 : 0) +
    (/[0-9]/.test(pw) ? 1 : 0) +
    (/[^A-Za-z0-9]/.test(pw) ? 1 : 0)
  );
  const colors = ['var(--red)','#f97316','#eab308','var(--green)','var(--green)'];
  bar.style.width = (score * 25) + '%';
  bar.style.background = colors[score];
}

function exportPasswords() {
  try { window.aeonBridge?.exportPasswords?.(); } catch(_) {}
}

// === Auto-initialize from bridge state ===
document.addEventListener('DOMContentLoaded', () => {
  // If vault is already unlocked (e.g. DPAPI auto-unlock), skip the lock screen
  if (window.__aeon && window.__aeon.vault_unlocked) {
    document.getElementById('vault_locked').classList.add('hidden');
    document.getElementById('vault_open').classList.remove('hidden');
    loadPasswords();
  }
});
</script>
</body>
</html>
